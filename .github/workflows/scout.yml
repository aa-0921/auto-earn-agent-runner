name: Scout

on:
  schedule:
    # 30 分ごと (off-minute :13, :43) で UTC :00/:30 集中による silent skip を回避
    # see lessons.md "GitHub Actions schedule cron は high-load 時に 3h 連続スキップ"
    - cron: "13,43 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "DEBUG=1 (詳細ログ)"
        type: boolean
        default: false
      threshold:
        description: "スコア閾値（デフォルト 5）"
        type: string
        default: "5"
      sources:
        description: "個別ソースのみ実行（カンマ区切り。空=全ソース）例: github_bounty,hn_hiring"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout private auto-earn-agent
        uses: actions/checkout@v4
        with:
          repository: aa-0921/auto-earn-agent
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: auto-earn-agent

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: auto-earn-agent/requirements.txt

      - name: Install deps
        run: pip install -r auto-earn-agent/requirements.txt

      - name: Run scout
        working-directory: auto-earn-agent
        env:
          # スコアリング優先: OpenRouter (無料モデル) → Gemini → heuristic
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.PRIVATE_REPO_PAT }}
          GH_REPO: aa-0921/auto-earn-agent
          DEBUG: ${{ inputs.debug && '1' || '0' }}
          THRESHOLD: ${{ inputs.threshold || '5' }}
          SOURCES: ${{ inputs.sources || '' }}
        run: python -m scout

      - name: Commit DB to private repo
        if: always()
        working-directory: auto-earn-agent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/scout.db
          if git diff --staged --quiet; then
            echo "no DB diff"
          else
            git commit -m "data: scout.db update [skip ci]"
            git push
          fi
